<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Browser Relay</title>
    <style>
      :root {
        color-scheme: light dark;
        --accent: #4e66ff;
        --accent-strong: #2f35ff;
        --panel: color-mix(in oklab, canvas 92%, canvasText 8%);
        --border: color-mix(in oklab, canvasText 18%, transparent);
        --muted: color-mix(in oklab, canvasText 70%, transparent);
        font-family: "Aptos", "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      }
      body {
        margin: 0;
        width: 320px;
        background: linear-gradient(180deg, color-mix(in oklab, var(--accent) 12%, canvas), canvas);
        color: canvasText;
      }
      .wrap {
        padding: 14px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 6px 0;
      }
      p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }
      .card {
        margin-top: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
      }
      .status {
        font-size: 12px;
        line-height: 1.4;
        margin-bottom: 10px;
      }
      .buttons {
        display: grid;
        gap: 8px;
      }
      button,
      a.button {
        appearance: none;
        border: 1px solid color-mix(in oklab, var(--accent) 45%, transparent);
        background: linear-gradient(180deg, color-mix(in oklab, var(--accent) 82%, white 18%), var(--accent-strong));
        color: white;
        text-decoration: none;
        text-align: center;
        border-radius: 12px;
        padding: 10px 12px;
        font-weight: 650;
        cursor: pointer;
      }
      button.secondary,
      a.button.secondary {
        background: color-mix(in oklab, canvas 90%, canvasText 10%);
        color: canvasText;
        border-color: var(--border);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .message {
        margin-top: 10px;
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Codex Browser Relay</h1>
      <p>Attach a tab and capture the visible area manually.</p>

      <div class="card">
        <div class="status" id="status">Loading…</div>
        <div class="buttons">
          <button id="toggle">Attach / Detach</button>
          <button id="capture">Capture Visible</button>
          <a class="button secondary" href="options.html" target="_blank" rel="noreferrer">Open Options</a>
          <a class="button secondary" href="https://github.com/mathiasvinicius/CodexBrowserRelay" target="_blank" rel="noreferrer">Project / Updates</a>
        </div>
        <div class="message" id="message"></div>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
  </html>
